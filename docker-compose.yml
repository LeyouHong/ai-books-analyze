services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE}
    env_file: ./backend/.env
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  redis_data:
