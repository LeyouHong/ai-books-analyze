server {
    listen 80;
    server_name leyouhong.xyz www.leyouhong.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name leyouhong.xyz www.leyouhong.xyz;
    client_max_body_size 60M;

    ssl_certificate     /etc/letsencrypt/live/leyouhong.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leyouhong.xyz/privkey.pem;

    # SSE — must be before general /api location, disable all buffering
    location /api/notifications/stream/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }
}
